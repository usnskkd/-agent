spring:
  application:
    name: ops-automation
  datasource:
    url: jdbc:h2:file:./data/ops-automation;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  cors:
    allowed-origin: http://127.0.0.1:5173
